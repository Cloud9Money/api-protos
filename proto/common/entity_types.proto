syntax = "proto3";

package cloud9.common;

option go_package = "github.com/Cloud9Money/api-protos/proto/common;commonpb";

// EntityType represents the type of entity (person or business)
enum EntityType {
  ENTITY_TYPE_UNSPECIFIED = 0;
  ENTITY_TYPE_PERSON = 1;
  ENTITY_TYPE_BUSINESS = 2;
}

// IDType represents the type of identification document
enum IDType {
  ID_TYPE_UNSPECIFIED = 0;
  ID_TYPE_PASSPORT = 1;
  ID_TYPE_ALIEN_ID = 2;
  ID_TYPE_NATIONAL_ID = 3;
  ID_TYPE_DRIVERS_LICENCE = 4;
}

// Gender represents the gender of a person
enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
  GENDER_OTHER = 3;
}

// IncomeRange represents the monthly income range bracket
enum IncomeRange {
  INCOME_RANGE_UNSPECIFIED = 0;
  INCOME_RANGE_LESS_THAN_10K = 1;
  INCOME_RANGE_10K_TO_50K = 2;
  INCOME_RANGE_50K_TO_100K = 3;
  INCOME_RANGE_100K_TO_500K = 4;
  INCOME_RANGE_GREATER_THAN_500K = 5;
}

// EmploymentStatus represents the employment status of a person
enum EmploymentStatus {
  EMPLOYMENT_STATUS_UNSPECIFIED = 0;
  EMPLOYMENT_STATUS_EMPLOYEE = 1;
  EMPLOYMENT_STATUS_SELF_EMPLOYED = 2;
  EMPLOYMENT_STATUS_UNEMPLOYED = 3;
  EMPLOYMENT_STATUS_EMPLOYER = 4;
  EMPLOYMENT_STATUS_STUDENT = 5;
  EMPLOYMENT_STATUS_OTHER = 6;
}

// DocType represents the type of document
enum DocType {
  DOC_TYPE_UNSPECIFIED = 0;
  DOC_TYPE_ID = 1;           // Front ID or Passport
  DOC_TYPE_BACK_ID = 2;
  DOC_TYPE_TAX_PIN = 3;
  DOC_TYPE_REG_CERT = 4;     // Registration Certificate
  DOC_TYPE_SELFIE = 5;
  DOC_TYPE_COI = 6;               // Certificate of Incorporation
  DOC_TYPE_COMPANY_KRA_PIN = 7;   // Company KRA pin certificate
  DOC_TYPE_CR12 = 8;              // Company CR12
  DOC_TYPE_ARTICLES_OF_ASSOC = 9; // Articles of Association
  DOC_TYPE_BOARD_RESOLUTION = 10; // Signed board resolution
  DOC_TYPE_PARTNERSHIP_DEED = 11; // Certified partnership deed
  DOC_TYPE_CR2_MEMORANDUM_OF_ASSOC = 12; // CR2 / Memorandum of Association (distinct from Articles of Association)
  // Director-scoped document types — linked to a specific director via entity_documents.director_id
  DOC_TYPE_DIRECTOR_ID = 13;       // Director ID (front)
  DOC_TYPE_DIRECTOR_BACK_ID = 14;  // Director ID (back)
  DOC_TYPE_DIRECTOR_SELFIE = 15;   // Director selfie
  DOC_TYPE_DIRECTOR_KRA_PIN = 16;  // Director personal KRA PIN certificate
  DOC_TYPE_SHAREHOLDER_REG_CERT = 17; // Corporate shareholder/partner registration certificate
}

// FileType represents the file content type
enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_PDF = 1;
  FILE_TYPE_PNG = 2;
  FILE_TYPE_JPG = 3;
  FILE_TYPE_JPEG = 4;
  FILE_TYPE_GIF = 5;
  FILE_TYPE_MP4 = 6;
  FILE_TYPE_MOV = 7;
  FILE_TYPE_AVI = 8;
  FILE_TYPE_MKV = 9;
  FILE_TYPE_WEBM = 10;
}
