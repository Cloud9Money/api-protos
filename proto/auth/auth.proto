syntax = "proto3";

package cloud9.auth;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/Cloud9Money/api-protos/proto/auth;authpb";

// User represents a user from the auth service
message User {
  // User ID
  string user_id = 1;

  // Entity ID (linked entity in Mithiril)
  string entity_id = 2;

  // Email address
  string email = 3;

  // Phone number
  string phone_number = 4;

  // User role
  string role = 5;

  // Permissions list
  repeated string permissions = 6;

  // User status
  string status = 7;

  // Jurisdiction (e.g., "KE", "UG", "TZ")
  string jurisdiction = 8;

  // Created timestamp
  google.protobuf.Timestamp created_at = 9;
}

// ValidateTokenRequest for token validation
message ValidateTokenRequest {
  // JWT token to validate
  string token = 1;
}

// ValidateTokenResponse
message ValidateTokenResponse {
  // Whether the token is valid
  bool valid = 1;

  // User details (if valid)
  User user = 2;

  // Error message (if invalid)
  string error = 3;
}

// GetUserRequest
message GetUserRequest {
  // User ID to retrieve
  string user_id = 1;
}

// GetUserResponse
message GetUserResponse {
  // User details
  User user = 1;
}

// CheckPermissionRequest
message CheckPermissionRequest {
  // User ID
  string user_id = 1;

  // Permission to check
  string permission = 2;
}

// CheckPermissionResponse
message CheckPermissionResponse {
  // Whether the user has the permission
  bool has_permission = 1;
}

// UpdateUserRequest for updating user phone number and/or email
message UpdateUserRequest {
  // entity ID of the user to update
  string entity_id = 1;

  // Phone number in E.164 format (e.g., "+254712345678")
  optional string phone_number = 2;

  // Email address
  optional string email = 3;
}

// UpdateUserResponse
message UpdateUserResponse {
  // Whether the update was successful
  bool success = 1;

  // Status message
  string message = 2;
}

// Initiates OTP to existing number
message SendOTPToContactRequest {
  // entity ID of the user to send OTP to
  string entity_id = 1;

  // Phone number in E.164 format (e.g., "+254712345678")
  optional string phone_number = 2;

  // Email address
  optional string email = 3;

  // Old or new contact status
  enum ContactStatus {
    OLD = 0; // Send OTP to old contact
    NEW = 1; // Send OTP to new contact
  }

  ContactStatus contact_status = 4;

  // Purpose of OTP (e.g., "update_contact", "verify_contact")
  enum OTPPurpose {
    UPDATE_CONTACT = 0; // OTP for updating contact
    VERIFY_CONTACT = 1; // OTP for verifying contact
  }

  OTPPurpose otp_purpose = 5;
}

message SendOTPToContactResponse {
  // Whether the OTP was sent successfully
  bool success = 1;

  // Status message
  string message = 2;

  // Verification token to be used for OTP verification
  string verification_token = 3;

  // Expiration time for the OTP
  google.protobuf.Timestamp expires_at = 4;

  // Verification status
  bool verified = 5;
}

// Validates code and marks old contact as verified
message VerifyContactOTPRequest {
  // Verification token received from SendOTPToOldContactResponse
  string verification_token = 1;

  // OTP code received by the user
  string otp_code = 2;

  // entity ID of the user to verify
  string entity_id = 3;
}

message VerifyContactOTPResponse {
  // Whether the verification was successful
  bool success = 1;

  // Status message
  string message = 2;
}

// AuthService provides authentication operations for internal services
service AuthService {
  // ValidateToken validates a JWT token
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // GetUser retrieves user information by ID
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // CheckPermission checks if a user has a specific permission
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // UpdateUser updates user phone number and/or email
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

  // SendOTPToOldContact initiates OTP to existing number
  rpc SendOTPOldContact(SendOTPToContactRequest) returns (SendOTPToContactResponse);

  // VerifyOldContact validates code and marks old contact as verified
  rpc VerifyContactOTP(VerifyContactOTPRequest) returns (VerifyContactOTPResponse);
}
