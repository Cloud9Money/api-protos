syntax = "proto3";

package cloud9.entities;

import "google/protobuf/timestamp.proto";
import "common/entity_types.proto";

option go_package = "github.com/Cloud9Money/api-protos/proto/entities;entitiespb";

// Entity represents a base entity (person or business)
message Entity {
  // Entity ID
  string id = 1;

  // Entity type (PERSON or BUSINESS)
  cloud9.common.EntityType type = 2;

  // Country (ISO 3166-1 alpha-3)
  string country = 3;

  // Phone number (E.164 format)
  string phone_number = 4;

  // Email address
  string email = 5;

  // Tax PIN
  string tax_pin = 6;

  // KYC status
  string kyc_status = 7;

  // KYC verification level (0=None, 1=CIP, 2=CDD, 3=EDD)
  int32 kyc_level = 11;

  // Address
  Address address = 8;

  // Created timestamp
  google.protobuf.Timestamp created_at = 9;

  // Updated timestamp
  google.protobuf.Timestamp updated_at = 10;
}

// Address represents a physical address
message Address {
  string line1 = 1;
  string line2 = 2;
  string city = 3;
  string state = 4;
  string country = 5;
  string postal_code = 6;
}

// EntityPerson represents a person entity
message EntityPerson {
  // Base entity
  Entity entity = 1;

  // First name
  string first_name = 2;

  // Last name
  string last_name = 3;

  // Middle name (optional)
  string middle_name = 4;

  // ID type (Passport, NationalID, etc.)
  cloud9.common.IDType id_type = 5;

  // ID number
  string id_number = 6;

  // Date of birth (YYYY-MM-DD format)
  string date_of_birth = 7;

  // Gender
  cloud9.common.Gender gender = 8;

  // Employment status
  cloud9.common.EmploymentStatus employment_status = 9;

  // Monthly income range
  cloud9.common.IncomeRange monthly_income = 10;
}

// EntityBusiness represents a business entity
message EntityBusiness {
  // Base entity
  Entity entity = 1;

  // Business type
  string business_type = 2;

  // Business legal name
  string business_legal_name = 3;

  // Registration number
  string registration_number = 4;

  // Industry
  string industry = 5;

  // Specific industry (if applicable)
  string specify_industry = 6;

  // Director entity IDs
  repeated string directors = 7;
}

// BusinessDirector represents a compliance director record on a business entity
message BusinessDirector {
  string id            = 1;  // UUID from business_directors table
  string first_name    = 2;
  string last_name     = 3;
  string middle_name   = 4;
  string id_type       = 5;  // NationalID | Passport | AlienID
  string id_number     = 6;
  string date_of_birth = 7;  // YYYY-MM-DD
  string nationality   = 8;  // ISO 3166-1 alpha-3
  string phone_number       = 9;  // optional, may be empty
  string email              = 10; // optional, may be empty
  string gender             = 11; // "Male" or "Female" — Choice Bank requirement
  string kra_pin            = 12; // KRA PIN number, e.g. A123456789B
  string id_front_doc_id = 13; // document ID for front of ID document
  string id_back_doc_id  = 14; // document ID for back of ID document
  string selfie_doc_id   = 15; // document ID for selfie photo
  string kra_pin_doc_id  = 16; // document ID for KRA PIN certificate
}

// LLCShareholder holds the parent company details for an LLC business entity
message LLCShareholder {
  string entity_id    = 1; // the LLC business entity UUID
  string company_name = 2; // legal name of the parent/shareholder company
}

message GetLLCShareholderRequest {
  string entity_id = 1; // business entity UUID
}

message GetLLCShareholderResponse {
  LLCShareholder shareholder = 1;
}

message GetBusinessDirectorsRequest {
  string entity_id = 1; // business entity UUID
}

message GetBusinessDirectorsResponse {
  repeated BusinessDirector directors = 1;
}

// GetEntityRequest
message GetEntityRequest {
  // Entity ID
  string entity_id = 1;
}

// GetEntityResponse
message GetEntityResponse {
  // Entity type
  cloud9.common.EntityType entity_type = 1;

  // Person data (if entity is a person)
  EntityPerson person = 2;

  // Business data (if entity is a business)
  EntityBusiness business = 3;
}

// EntityService provides entity operations for internal services
service EntityService {
  // GetEntity retrieves an entity by ID with all details
  rpc GetEntity(GetEntityRequest) returns (GetEntityResponse);
  // GetBusinessDirectors retrieves all directors for a business entity
  rpc GetBusinessDirectors(GetBusinessDirectorsRequest) returns (GetBusinessDirectorsResponse);
  // GetLLCShareholder returns the shareholder company details for an LLC business entity
  rpc GetLLCShareholder(GetLLCShareholderRequest) returns (GetLLCShareholderResponse);
}
